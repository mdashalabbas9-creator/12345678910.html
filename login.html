<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Animated Login Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(
        -45deg, #0f2027, #203a43, #2c5364, #1c92d2
    );
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
}

/* Animated Background */

.background{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.bubble{
    position:absolute;
    bottom:-120px;
    border-radius:50%;
    background:rgba(255,255,255,.25);
    backdrop-filter:blur(10px);
    animation:floatUp linear infinite;
}

.bubble:nth-child(1){
    left:10%;
    width:70px;
    height:70px;
    animation-duration:10s;
}

.bubble:nth-child(2){
    left:25%;
    width:120px;
    height:120px;
    animation-duration:15s;
}

.bubble:nth-child(3){
    left:45%;
    width:90px;
    height:90px;
    animation-duration:12s;
}

.bubble:nth-child(4){
    left:65%;
    width:140px;
    height:140px;
    animation-duration:18s;
}

.bubble:nth-child(5){
    left:85%;
    width:80px;
    height:80px;
    animation-duration:13s;
}

@keyframes floatUp{
    from{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

@keyframes gradientMove{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

/* Cute Floating Hearts */

.heart{
    position:absolute;
    color:rgba(255,255,255,.6);
    font-size:25px;
    animation:heartFloat 8s linear infinite;
}

.heart:nth-child(6){
    left:20%;
    animation-delay:1s;
}

.heart:nth-child(7){
    left:50%;
    animation-delay:3s;
}

.heart:nth-child(8){
    left:80%;
    animation-delay:5s;
}

@keyframes heartFloat{
    from{
        bottom:-50px;
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        bottom:110%;
        transform:translateX(50px);
        opacity:0;
    }
}

/* Login Card */

.login-box{
    width:380px;
    padding:40px;
    border-radius:35px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.3);
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    text-align:center;
    position:relative;
    z-index:10;
    animation:cardAppear 1s ease;
}

@keyframes cardAppear{
    from{
        opacity:0;
        transform:translateY(50px) scale(.8);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* Cute Avatar */

.avatar{
    width:110px;
    height:110px;
    margin:auto;
    margin-bottom:20px;
    border-radius:50%;
    background:linear-gradient(
        135deg,
        #ff6ec7,
        #ffb6e6
    );
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    color:white;
    box-shadow:0 10px 30px rgba(255,105,180,.4);
    animation:bounce 3s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

.login-box h2{
    color:white;
    margin-bottom:8px;
}

.login-box p{
    color:#fff;
    opacity:.9;
    margin-bottom:30px;
}

/* Inputs */

.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:15px 20px;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,.25);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:white;
}

/* Button */

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(
        135deg,
        #ff4db8,
        #ff85c2
    );
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.4s;
}

.login-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 25px rgba(255,20,147,.4);
}

/* Links */

.links{
    margin-top:20px;
}

.links a{
    color:white;
    text-decoration:none;
    font-size:14px;
    margin:0 10px;
}

.links a:hover{
    text-decoration:underline;
}

/* Responsive */

@media(max-width:480px){

.login-box{
    width:90%;
    padding:30px;
}

}

</style>
</head>
<body>

<div class="background">

    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="heart">❤</div>
    <div class="heart">❤</div>
    <div class="heart">❤</div>

</div>

<div class="login-box">

    <div class="avatar">
        😊
    </div>

    <h2>Welcome Back!</h2>
    <p>Login to continue your cute journey 💖</p>

    <div class="input-box">
        <input type="email" placeholder="Email Address">
    </div>

    <div class="input-box">
        <input type="password" placeholder="Password">
    </div>

    <button class="login-btn">
        Login ✨
    </button>

    <div class="links">
        <a href="#">Forgot Password?</a>
        <a href="#">Sign Up</a>
    </div>

</div>

</body>
</html>
